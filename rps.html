<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock paper scissor</title>
    <link rel="stylesheet" href="rps.css">
</head>
<body>
    <!--header of rock paper scissor-->
    <div>
        <h1>rock paper scissor</h1>
    </div>


    <!--choices-->
    <div class="choices">
       <div class="choice" id="rock">🪨</div> 
       <div class="choice" id="paper">📄</div>
       <div class="choice" id="scissor">✂</div>
    </div>


    <!--score board-->
    <div class="scorebd">
        <div class><p id="usersc">0</p><p>your score</p></div>
        <div class><p id="compsc">0</p><p>computer score</p></div>
    </div>
 
     <div class="msgcnt">
      <p id="msg">your move</p>
    </div>
     <!--rest button-->

   <button class="resetbt">Reset</button>

    <script src="rps.js"></script>
</body>
</html>
